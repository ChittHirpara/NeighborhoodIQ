<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>NeighborhoodIQ - AI Real Estate Due Diligence for India</title>
    <meta name="description" content="NeighborhoodIQ uses AI to generate instant, standardized neighborhood due diligence reports for any location in India. Check schools, safety, AQI, property trends, flood risk and more before buying." />
    <meta name="keywords" content="neighborhood analysis India, real estate due diligence, property research AI, buy home India, neighborhood score, school safety AQI report" />
    <meta name="author" content="NeighborhoodIQ" />
    <meta name="robots" content="index, follow" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏢</text></svg>">

    <!-- Canonical -->
    <link rel="canonical" href="https://neighborhoodiq.app/" />

    <!-- Open Graph (LinkedIn, Facebook, WhatsApp) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="NeighborhoodIQ" />
    <meta property="og:title" content="NeighborhoodIQ - AI Real Estate Due Diligence" />
    <meta property="og:description" content="Instant AI-powered neighborhood reports for any location in India. Schools, safety, AQI, flood risk, property trends and more." />
    <meta property="og:url" content="https://neighborhoodiq.app/" />
    <meta property="og:image" content="https://neighborhoodiq.app/og-image.png" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="NeighborhoodIQ - AI Real Estate Due Diligence" />
    <meta name="twitter:description" content="Instant AI-powered neighborhood reports for any location in India. Check before you buy." />
    <meta name="twitter:image" content="https://neighborhoodiq.app/og-image.png" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "NeighborhoodIQ",
      "description": "AI-powered neighborhood due diligence platform for Indian real estate buyers.",
      "url": "https://neighborhoodiq.app",
      "applicationCategory": "RealEstateListing",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "INR"
      },
      "creator": {
        "@type": "Organization",
        "name": "NeighborhoodIQ"
      }
    }
    </script>

    <!-- Theme color (mobile browser tab) -->
    <meta name="theme-color" content="#050505" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

</html>
